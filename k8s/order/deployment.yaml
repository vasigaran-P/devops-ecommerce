apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: devops-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 474418737424.dkr.ecr.ap-south-1.amazonaws.com/order-service:c1b1ea5
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: order-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
