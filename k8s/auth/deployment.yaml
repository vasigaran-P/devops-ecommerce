apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: devops-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 474418737424.dkr.ecr.ap-south-1.amazonaws.com/auth-service:5d660bf
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: auth-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
