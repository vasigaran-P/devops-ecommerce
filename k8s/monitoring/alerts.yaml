apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ecommerce-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: ecommerce.rules
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="devops-ecommerce"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently"

        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="devops-ecommerce", condition="true"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} has been not ready for more than 2 minutes"

        - alert: HighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="devops-ecommerce"}[5m])) by (pod) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on pod {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} CPU usage is above 80%"

        - alert: HighMemoryUsage
          expr: sum(container_memory_working_set_bytes{namespace="devops-ecommerce"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="devops-ecommerce"}) by (pod) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on pod {{ $labels.pod }}"
            description: "Pod {{ $labels.pod }} memory usage is above 80%"

        - alert: MongoDBDown
          expr: kube_pod_status_ready{namespace="devops-ecommerce", pod=~"mongo.*", condition="true"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "MongoDB is down"
            description: "MongoDB pod is not ready — all services will fail"
